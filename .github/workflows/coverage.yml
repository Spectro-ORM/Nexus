name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Code Coverage
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate coverage data
        run: |
          .github/workflows/scripts/generate-coverage.sh

      - name: Generate coverage report
        run: |
          Scripts/coverage-report.sh

      - name: Check coverage threshold
        run: |
          .github/workflows/scripts/check-coverage.sh

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .build/coverage/
          retention-days: 30

      - name: Add coverage PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const summary = fs.readFileSync('.build/coverage/summary.txt', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## Coverage Report\n\n\`\`\`\n${summary}\n\`\`\``
              });
            } catch (error) {
              console.log('Could not read coverage summary:', error.message);
            }

  coverage-linux:
    name: Coverage (Linux)
    runs-on: ubuntu-latest
    container:
      image: swift:6.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM tools
        run: |
          apt-get update
          apt-get install -y llvm-runtime

      - name: Generate coverage data
        run: |
          swift test --enable-code-coverage

      - name: Export coverage
        run: |
          llvm-cov export \
            .build/*/swift-package-tests \
            --format=lcov \
            --ignore-filename-regex='Tests/|\.build/|Checkouts/' \
            > coverage.lcov

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-linux
          path: coverage.lcov
          retention-days: 30
